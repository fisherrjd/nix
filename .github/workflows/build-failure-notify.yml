name: notify on build failure

on:
  workflow_run:
    workflows: [build]
    types: [completed]

jobs:
  notify:
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 10

      - name: collect failure context
        id: context
        run: |
          # Get the failing jobs info
          echo "run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
          echo "run_url=${{ github.event.workflow_run.html_url }}" >> $GITHUB_OUTPUT
          echo "commit=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          echo "branch=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_OUTPUT
          echo "config=${{ github.event.workflow_run.name }}" >> $GITHUB_OUTPUT

          # Get recent flake.lock changes if any
          git log --oneline -5 >> /tmp/recent_commits.txt || true

          # Get the actual failing build log excerpt (last 100 lines)
          # We'll fetch this via API since we don't have the raw logs
          echo "Fetching build logs..."

      - name: download build logs
        id: logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"

          # Get failed jobs
          gh run view $RUN_ID --json jobs --repo ${{ github.repository }} > /tmp/jobs.json

          # Extract failed job names
          FAILED_JOBS=$(cat /tmp/jobs.json | jq -r '.jobs[] | select(.conclusion == "failure") | .name' | tr '\n' ', ')
          echo "failed_jobs=$FAILED_JOBS" >> $GITHUB_OUTPUT

          # Get logs from first failed job
          FIRST_FAILED=$(cat /tmp/jobs.json | jq -r '.jobs[] | select(.conclusion == "failure") | .name' | head -1)
          echo "first_failed=$FIRST_FAILED" >> $GITHUB_OUTPUT

          # Download full logs for analysis
          gh run download $RUN_ID --dir /tmp/run-logs 2>/dev/null || echo "Could not download logs"

          # Create excerpt of failure
          find /tmp/run-logs -name "*.txt" -exec tail -150 {} \; 2>/dev/null | head -200 > /tmp/failure_excerpt.txt || echo "No logs available"

      - name: prepare discord payload
        id: payload
        run: |
          # Create the Discord message with context for Hermes to analyze
          FAILED_JOBS="${{ steps.logs.outputs.failed_jobs }}"
          RUN_URL="${{ steps.context.outputs.run_url }}"
          COMMIT="${{ steps.context.outputs.commit }}"
          BRANCH="${{ steps.context.outputs.branch }}"

          # Read failure excerpt (escape for JSON)
          EXCERPT=$(cat /tmp/failure_excerpt.txt 2>/dev/null | head -100 | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g' || echo "No excerpt available")

          # Read recent commits
          COMMITS=$(cat /tmp/recent_commits.txt 2>/dev/null | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g' || echo "No commits")

          # Build JSON payload
          cat > /tmp/payload.json << EOF
          {
            "username": "Nix CI",
            "avatar_url": "https://nixos.org/logo/nixos-logo-only-hires.png",
            "content": "🔴 **Build Failed** — @everyone",
            "embeds": [
              {
                "title": "Failed Jobs: ${FAILED_JOBS}",
                "url": "${RUN_URL}",
                "color": 15158332,
                "fields": [
                  {
                    "name": "Branch",
                    "value": "${BRANCH}",
                    "inline": true
                  },
                  {
                    "name": "Commit",
                    "value": "\`${COMMIT:0:8}\`",
                    "inline": true
                  },
                  {
                    "name": "Recent Commits",
                    "value": "\`\`\`\n${COMMITS}\n\`\`\`",
                    "inline": false
                  },
                  {
                    "name": "Failure Excerpt",
                    "value": "\`\`\`\n${EXCERPT}\n\`\`\`",
                    "inline": false
                  }
                ],
                "footer": {
                  "text": "Hermes: Please analyze this Nix build failure and suggest fixes."
                }
              }
            ]
          }
          EOF

          cat /tmp/payload.json

      - name: send to discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d @/tmp/payload.json \
            "$WEBHOOK_URL" || echo "Failed to send webhook"

      - name: also send summary for hermes analysis
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Send a follow-up that explicitly asks Hermes to analyze
          cat > /tmp/ask_hermes.json << EOF
          {
            "username": "Nix CI",
            "content": "<@200277038492418048> **Hermes, analyze this Nix build failure:**\n\n**Context:**\n- Repo: fisherrjd/ops (cfg)\n- Failed: ${{ steps.logs.outputs.failed_jobs }}\n- Run: ${{ steps.context.outputs.run_url }}\n\n**Please:**\n1. Read the failure excerpt above\n2. Check if flake.lock was recently updated\n3. Identify the failing derivation/package\n4. Propose the fix or rollback strategy\n\nUse your terminal tools to inspect the repo at commit ${{ steps.context.outputs.commit }} if needed."
          }
          EOF

          curl -X POST -H "Content-Type: application/json" \
            -d @/tmp/ask_hermes.json \
            "$WEBHOOK_URL" || echo "Failed to send follow-up"
