name: notify on build failure

on:
  workflow_run:
    workflows: [build]
    types: [completed]

jobs:
  notify:
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 20
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: collect failure context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          REPO="${{ github.repository }}"
          COMMIT="${{ github.event.workflow_run.head_sha }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"

          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "run_url=${{ github.event.workflow_run.html_url }}" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          # Get failed job names
          gh run view $RUN_ID --json jobs --repo $REPO > /tmp/jobs.json
          FAILED_JOBS=$(cat /tmp/jobs.json | jq -r '.jobs[] | select(.conclusion == "failure") | .name' | tr '\n' ', ' | sed 's/, $//')
          echo "failed_jobs=$FAILED_JOBS" >> $GITHUB_OUTPUT

          # Get list of failed config names (eldo, airbook, etc)
          FAILED_CONFIGS=$(cat /tmp/jobs.json | jq -r '.jobs[] | select(.conclusion == "failure") | .name' | grep -oP '(?<=nix \()[^ ]+' | tr '\n' ' ')
          echo "failed_configs=$FAILED_CONFIGS" >> $GITHUB_OUTPUT

      - name: download build artifacts
        id: artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          REPO="${{ github.repository }}"
          FAILED_CONFIGS="${{ steps.context.outputs.failed_configs }}"

          # Download all artifacts from the failed run
          mkdir -p /tmp/artifacts
          gh run download $RUN_ID --dir /tmp/artifacts --repo $REPO 2>/dev/null || echo "Could not download artifacts"

          # Build failure excerpts from each artifact
          > /tmp/all_failures.txt
          for config in $FAILED_CONFIGS; do
            log_path="/tmp/artifacts/build-log-$config/build.log"
            if [ -f "$log_path" ]; then
              echo "=== $config failure ===" >> /tmp/all_failures.txt
              tail -150 "$log_path" >> /tmp/all_failures.txt
              echo "" >> /tmp/all_failures.txt
            fi
          done

          # If artifacts empty, note that
          if [ ! -s /tmp/all_failures.txt ]; then
            echo "No build logs available - artifacts may have expired or failed to upload" > /tmp/all_failures.txt
          fi

      - name: analyze flake changes
        id: flake_changes
        run: |
          COMMIT="${{ github.event.workflow_run.head_sha }}"

          # Check if flake.lock was modified in this commit
          if git diff-tree --no-commit-id --name-only -r $COMMIT | grep -q "flake.lock"; then
            echo "flake.lock modified: yes" >> /tmp/analysis.txt
            echo "" >> /tmp/analysis.txt
            echo "=== flake.lock changes ===" >> /tmp/analysis.txt
            git show $COMMIT -- flake.lock | grep -E "(^\+|^-|rev|lastModified)" | head -50 >> /tmp/analysis.txt || true
          else
            echo "flake.lock modified: no" >> /tmp/analysis.txt
            echo "Recent flake.lock commits:" >> /tmp/analysis.txt
            git log --oneline -- flake.lock | head -5 >> /tmp/analysis.txt || true
          fi

          # Get nixpkgs rev before/after if possible
          echo "" >> /tmp/analysis.txt
          echo "=== nixpkgs version info ===" >> /tmp/analysis.txt
          git show $COMMIT:flake.lock 2>/dev/null | grep -A5 '"nixpkgs"' | grep 'rev' | head -1 >> /tmp/analysis.txt || echo "Could not extract nixpkgs rev"

      - name: prepare discord payload for reaper
        id: payload
        env:
          FAILED_JOBS: ${{ steps.context.outputs.failed_jobs }}
          RUN_URL: ${{ steps.context.outputs.run_url }}
          COMMIT: ${{ steps.context.outputs.commit }}
          BRANCH: ${{ steps.context.outputs.branch }}
          FAILED_CONFIGS: ${{ steps.context.outputs.failed_configs }}
          REPO: ${{ github.repository }}
        run: |
          EXCERPT=$(cat /tmp/all_failures.txt 2>/dev/null | tail -30 | cut -c1-900 || echo "No excerpt available")
          FLAKE_ANALYSIS=$(cat /tmp/analysis.txt 2>/dev/null | cut -c1-900 || echo "No analysis")
          COMMIT_SHORT="${COMMIT:0:8}"

          jq -n \
            --arg failed_jobs "$FAILED_JOBS" \
            --arg run_url "$RUN_URL" \
            --arg branch "$BRANCH" \
            --arg commit_short "$COMMIT_SHORT" \
            --arg commit_url "https://github.com/${REPO}/commit/${COMMIT}" \
            --arg configs "$FAILED_CONFIGS" \
            --arg excerpt "\`\`\`\n${EXCERPT}\n\`\`\`" \
            --arg flake "\`\`\`\n${FLAKE_ANALYSIS}\n\`\`\`" \
            '{
              username: "Nix CI",
              avatar_url: "https://nixos.org/logo/nixos-logo-only-hires.png",
              content: "🔴 **Build Failed** — <@1491182017096843300>",
              embeds: [{
                title: ("Failed: " + $failed_jobs),
                url: $run_url,
                color: 15158332,
                fields: [
                  {name: "Branch", value: $branch, inline: true},
                  {name: "Commit", value: ("[`\($commit_short)`](\($commit_url))"), inline: true},
                  {name: "Configs", value: $configs, inline: true},
                  {name: "Failure Logs", value: $excerpt, inline: false},
                  {name: "Flake Analysis", value: $flake, inline: false}
                ],
                footer: {text: "Click title to view full run logs"}
              }]
            }' > /tmp/final_payload.json
          cat /tmp/final_payload.json

      - name: send to discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d @/tmp/final_payload.json \
            "$WEBHOOK_URL" || echo "Failed to send webhook"
